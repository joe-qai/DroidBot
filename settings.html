<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM配置 - DroidBot</title>
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #0ea5e9 0%, #8b5cf6 50%, #ec4899 100%);
            --secondary-gradient: linear-gradient(135deg, #8b5cf6 0%, #ec4899 50%, #f97316 100%);
            --accent-gradient: linear-gradient(135deg, #06b6d4 0%, #3b82f6 50%, #8b5cf6 100%);
            --bg-dark: #020617;
            --bg-card: #0f172a;
            --bg-card-hover: #1e293b;
            --border-color: rgba(148, 163, 184, 0.1);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            --info: #3b82f6;
            --glow-primary: rgba(14, 165, 233, 0.4);
            --glow-accent: rgba(139, 92, 246, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .glow-effect {
            background: var(--primary-gradient);
            filter: blur(80px);
            opacity: 0.15;
            position: absolute;
            top: -10%;
            right: -10%;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            pointer-events: none;
        }

        .glow-effect-2 {
            background: var(--accent-gradient);
            filter: blur(60px);
            opacity: 0.1;
            position: absolute;
            bottom: -10%;
            left: -10%;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 1;
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 260px;
            background: var(--bg-card);
            border-right: 1px solid var(--border-color);
            padding: 24px 0;
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            overflow-y: auto;
        }

        .logo {
            padding: 0 24px 24px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 16px;
        }

        .logo h1 {
            font-size: 20px;
            font-weight: 700;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo p {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .nav-menu {
            padding: 0 12px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            margin-bottom: 4px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-secondary);
            text-decoration: none;
            position: relative;
            overflow: hidden;
        }

        .nav-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--primary-gradient);
            transform: scaleY(0);
            transition: transform 0.2s ease;
        }

        .nav-item:hover {
            background: var(--bg-card-hover);
            color: var(--text-primary);
        }

        .nav-item:hover::before {
            transform: scaleY(1);
        }

        .nav-item.active {
            background: var(--primary-gradient);
            color: white;
        }

        .nav-item.active::before {
            transform: scaleY(1);
        }

        .nav-item svg {
            width: 20px;
            height: 20px;
            margin-right: 12px;
            flex-shrink: 0;
        }

        .nav-item span {
            font-size: 14px;
            font-weight: 500;
        }

        .main-content {
            flex: 1;
            margin-left: 260px;
            padding: 32px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }

        .page-title h2 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .page-title p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .btn {
            display: flex;
            align-items: center;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
            outline: none;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.1);
            transition: left 0.3s ease;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn-primary {
            background: var(--primary-gradient);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: var(--bg-card-hover);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .btn svg {
            width: 16px;
            height: 16px;
            margin-right: 8px;
        }

        .settings-section {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .settings-section h3 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .settings-section h3 svg {
            width: 20px;
            height: 20px;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-secondary);
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: rgba(102, 126, 234, 0.5);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .input-group input::placeholder {
            color: var(--text-muted);
        }

        .input-group select {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 14px;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .input-group select:focus {
            outline: none;
            border-color: rgba(102, 126, 234, 0.5);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .llm-provider {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }

        .provider-card {
            padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid var(--border-color);
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            position: relative;
        }

        .provider-card:hover {
            border-color: rgba(102, 126, 234, 0.3);
            transform: translateY(-2px);
        }

        .provider-card.selected {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.1);
        }

        .provider-card.selected::before {
            content: '';
            position: absolute;
            top: 8px;
            right: 8px;
            width: 20px;
            height: 20px;
            background: var(--primary-gradient);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .provider-card.selected::after {
            content: '✓';
            position: absolute;
            top: 11px;
            right: 11px;
            color: white;
            font-size: 12px;
            font-weight: bold;
        }

        .provider-card svg {
            width: 48px;
            height: 48px;
            margin-bottom: 12px;
            margin-left: auto;
            margin-right: auto;
        }

        .provider-card h4 {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .provider-card p {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .api-key-info {
            padding: 14px;
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.3);
            border-radius: 10px;
            font-size: 13px;
            color: var(--warning);
            margin-top: 12px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .api-key-info svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
            margin-top: 1px;
        }

        .config-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        .config-actions .btn {
            padding: 12px 32px;
        }

        .toast {
            position: fixed;
            bottom: 32px;
            right: 32px;
            padding: 16px 20px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 1001;
            animation: slideInToast 0.3s ease;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        @keyframes slideInToast {
            from { opacity: 0; transform: translateX(100px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .toast.hide {
            animation: slideOutToast 0.3s ease forwards;
        }

        @keyframes slideOutToast {
            from { opacity: 1; transform: translateX(0); }
            to { opacity: 0; transform: translateX(100px); }
        }

        .toast.success {
            border-color: rgba(16, 185, 129, 0.3);
            background: rgba(16, 185, 129, 0.08);
        }

        .toast.success svg {
            color: var(--success);
        }

        .toast.error {
            border-color: rgba(239, 68, 68, 0.3);
            background: rgba(239, 68, 68, 0.08);
        }

        .toast.error svg {
            color: var(--error);
        }

        .toast.info {
            border-color: rgba(59, 130, 246, 0.3);
            background: rgba(59, 130, 246, 0.08);
        }

        .toast.info svg {
            color: var(--info);
        }

        .toast svg {
            width: 18px;
            height: 18px;
        }

        .toast-message {
            font-size: 14px;
            font-weight: 500;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                position: relative;
                border-right: none;
                border-bottom: 1px solid var(--border-color);
            }

            .main-content {
                margin-left: 0;
                padding: 20px;
            }

            .llm-provider {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

    <script>
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toast-message');
        let toastTimeout = null;

        function showToast(type, message) {
            if (toastTimeout) {
                clearTimeout(toastTimeout);
            }
            toast.className = `toast ${type}`;
            toastMessage.textContent = message;
            toast.style.display = 'flex';
            toast.classList.remove('hide');
            toastTimeout = setTimeout(() => {
                toast.classList.add('hide');
                setTimeout(() => { toast.style.display = 'none'; }, 300);
            }, 3000);
        }

        const providerCards = document.querySelectorAll('.provider-card');
        const apiBaseInput = document.getElementById('api-base');
        const apiKeyInput = document.getElementById('api-key');

        const providerUrls = {
            'openapi': 'https://api.openai.com/v1',
            'anthropic': 'https://api.anthropic.com/v1',
            'local': 'http://localhost:8000/v1'
        };

        providerCards.forEach(card => {
            card.addEventListener('click', () => {
                providerCards.forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
                const provider = card.getAttribute('data-provider');
                apiBaseInput.value = providerUrls[provider];
                
                if (provider === 'local') {
                    apiKeyInput.disabled = true;
                    apiKeyInput.placeholder = '本地模型无需 API Key';
                } else {
                    apiKeyInput.disabled = false;
                    apiKeyInput.placeholder = '输入您的 API Key';
                }
                
                showToast('info', `已选择 ${card.querySelector('h4').textContent}`);
            });
        });

        const temperature = document.getElementById('temperature');
        const tempValue = document.getElementById('temp-value');
        temperature.addEventListener('input', (e) => {
            tempValue.textContent = e.target.value;
        });

        const saveBtn = document.getElementById('save-btn');
        saveBtn.addEventListener('click', () => {
            showToast('info', '正在保存配置...');
            setTimeout(() => { showToast('success', '配置保存成功'); }, 1000);
        });

        const resetBtn = document.getElementById('reset-btn');
        resetBtn.addEventListener('click', () => {
            showToast('info', '正在重置配置...');
            setTimeout(() => { showToast('success', '已重置为默认配置'); }, 1000);
        });

        const testBtn = document.getElementById('test-btn');
        testBtn.addEventListener('click', () => {
            showToast('info', '正在测试 LLM 连接...');
            setTimeout(() => { showToast('success', 'LLM 连接测试成功'); }, 2000);
        });

        const applyBtn = document.getElementById('apply-btn');
        applyBtn.addEventListener('click', () => {
            showToast('info', '正在应用配置...');
            setTimeout(() => { showToast('success', '配置已应用'); }, 1000);
        });
    </script>
</body>
</html>
